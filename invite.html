<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DingDong RoBo | 邀请访问</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #20242a;
        --muted: #626a73;
        --line: #d9dde3;
        --brand: #1f6feb;
        --brand-dark: #1657ba;
        --surface: rgba(255, 255, 255, 0.92);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
        color: var(--ink);
        background:
          linear-gradient(135deg, rgba(31, 111, 235, 0.14), transparent 42%),
          linear-gradient(315deg, rgba(15, 124, 97, 0.12), transparent 48%),
          #f7f8fb;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(420px, 100%);
        border: 1px solid rgba(32, 36, 42, 0.08);
        background: var(--surface);
        box-shadow: 0 24px 80px rgba(32, 36, 42, 0.12);
        border-radius: 8px;
        padding: 32px;
      }

      .brand {
        margin: 0 0 8px;
        font-size: 26px;
        line-height: 1.16;
      }

      .hint {
        margin: 0 0 26px;
        color: var(--muted);
        line-height: 1.7;
        font-size: 14px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 700;
      }

      input {
        width: 100%;
        min-height: 46px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 14px;
        font: inherit;
        outline: none;
        background: #fff;
      }

      input:focus {
        border-color: var(--brand);
        box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.16);
      }

      button {
        width: 100%;
        min-height: 46px;
        margin-top: 16px;
        border: 0;
        border-radius: 6px;
        background: var(--brand);
        color: #fff;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      button:hover {
        background: var(--brand-dark);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .message {
        min-height: 20px;
        margin: 14px 0 0;
        color: #a4252b;
        font-size: 13px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 class="brand">DingDong RoBo</h1>
      <p class="hint">请输入邀请码继续访问。</p>
      <form id="invite-form">
        <label for="code">邀请码</label>
        <input id="code" name="code" type="password" autocomplete="one-time-code" required autofocus>
        <button type="submit">进入网站</button>
        <p class="message" id="message" role="alert" aria-live="polite"></p>
      </form>
    </main>
    <script>
      const form = document.querySelector('#invite-form');
      const codeInput = document.querySelector('#code');
      const message = document.querySelector('#message');
      const button = form.querySelector('button');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        message.textContent = '';
        button.disabled = true;

        try {
          const response = await fetch('/api/verify-invite', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: codeInput.value }),
          });
          const result = await response.json();

          if (!response.ok || !result.ok) {
            message.textContent = result.message || '邀请码不正确';
            return;
          }

          const params = new URLSearchParams(window.location.search);
          const next = params.get('next') || '/index.html';
          window.location.assign(next.startsWith('/') ? next : '/index.html');
        } catch (error) {
          message.textContent = '网络异常，请稍后重试';
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
